[tools]
bun = "1.2.10"
python = "3.13.5"

# ──────────────────────────────────────────────────────────────────────
# Release pipeline — run when a new game version drops.
#
#   mise run release           # sync + regenerate everything
#   mise run release:upload    # push everything to the wiki
#
# Per-entity runs go through the dispatchers directly:
#   bun scripts/generate-source.ts --entity=gears
#   bun scripts/generate-icons.ts  --entity=upgrades "$SPRITES"
#   bun scripts/upload-wiki.ts     --entity=upgrades [--dry-run]
#   bun scripts/upload-files.ts    --entity=upgrades [--dry-run]
#
# Prerequisite for icons: extract the active version's Unity assets to
# ~/MycopunkExtracted/<version>/ExportedProject/Assets/Texture2D using
# AssetStudio or UABEA. Active version is read from .dump-cache/current.
# ──────────────────────────────────────────────────────────────────────

[tasks."release:sync"]
description = "Fetch latest game data dump + JSON schema into .dump-cache/"
run = "bun scripts/sync-data.ts"

[tasks."report:collisions"]
description = "Report cross-entity (resolved) + within-entity page-title collisions"
depends = ["release:sync"]
run = "bun scripts/report-collisions.ts"

# === Source generation ─────────────────────────────────────────────────

[tasks."release:source"]
description = "Generate /source + skeleton wiki pages for every entity"
depends = ["release:sync"]
run = "bun scripts/generate-source.ts --all"

[tasks."release:patterns"]
description = "Generate upgrade hex-pattern SVGs"
depends = ["release:sync"]
run = "bun scripts/generate-upgrade-svgs.ts"

[tasks."release:character-skill-trees"]
description = "Render per-character skill-tree SVGs"
depends = ["release:sync"]
run = "bun scripts/generate-character-skill-trees.ts"

[tasks."release:skin-previews"]
description = "Build per-variant preview assets (still + 360° webp) from in-game renders"
depends = ["release:sync"]
run = "bun scripts/generate-skin-previews.ts"

# === Icon extraction ────────────────────────────────────────────────────

[tasks."release:icons"]
description = "Extract icons from spritesheets for every entity that has one"
depends = ["release:sync"]
run = '''
VERSION=$(cat .dump-cache/current 2>/dev/null || echo unknown)
SPRITES="$HOME/MycopunkExtracted/$VERSION/ExportedProject/Assets/Texture2D"
if [ ! -d "$SPRITES" ]; then
  echo "✗ Spritesheets not found: $SPRITES"
  echo "  Extract with AssetStudio/UABEA from the game install for $VERSION,"
  echo "  then re-run: mise run release:icons"
  exit 1
fi
echo "→ Using spritesheets: $SPRITES"
bun scripts/generate-icons.ts --all "$SPRITES"
'''

# === Top-level aggregators ─────────────────────────────────────────────

[tasks.release]
description = "Full regen: sync data + every entity's wiki source + assets"
depends = [
  "release:sync",
  "release:source",
  "release:icons",
  "release:patterns",
  "release:character-skill-trees",
  "release:skin-previews"
]
run = '''
echo ""
echo "=== Generation complete ==="
echo "Output is in generated-wiki-source/ (gitignored — regeneratable)."
echo ""
echo "Push to the wiki:"
echo "  mise run release:upload                        # everything"
echo "  bun scripts/upload-wiki.ts --entity=NAME       # one entity (pages)"
echo "  bun scripts/upload-files.ts --entity=NAME      # one entity (icons/patterns)"
'''

# === Uploads ────────────────────────────────────────────────────────────

[tasks."release:upload-wiki"]
description = "Upload /source + skeleton pages for every entity"
run = "bun scripts/upload-wiki.ts --all"

[tasks."release:upload-files"]
description = "Upload icons + patterns for every entity"
run = "bun scripts/upload-files.ts --all"

[tasks."release:upload-skin-previews"]
description = "Upload skin preview assets (jpg stills + webp 360° rotations)"
run = "bun scripts/upload-skin-previews.ts"

[tasks."release:upload"]
description = "Push everything to the wiki — run after `mise run release`"
depends = ["release:upload-wiki", "release:upload-files", "release:upload-skin-previews"]

# === CI release (data-driven only — no local-asset steps) ───────────────
# Excludes release:icons (needs ~/MycopunkExtracted/<version>/Texture2D)
# and release:skin-previews (needs in-game renders). Used by
# .github/workflows/release-wiki.yml.

[tasks."release:ci"]
description = "CI-safe regen: data-driven sources + SVGs (no local-asset steps)"
depends = [
  "release:sync",
  "release:source",
  "release:patterns",
  "release:character-skill-trees"
]

[tasks."release:upload-ci"]
description = "Upload CI-generated wiki source + SVG assets (skips absent icon dirs)"
run = '''
bun scripts/upload-wiki.ts --all
bun scripts/upload-files.ts --all
'''
