[tasks.release]
description = "Full release: sync data + regenerate every entity (upgrades, gears, status effects, resources, characters, enemies, threats, collectables, rarities, crafting, directives) — pages, icons, patterns"
depends = [
  "release:sync",
  # Upgrades
  "release:source",
  "release:icons",
  "release:patterns",
  # Gears
  "release:gears",
  "release:gear-icons",
  # Status effects
  "release:status-effects",
  "release:status-effect-icons",
  # Resources
  "release:resources",
  "release:resource-icons",
  # Characters
  "release:characters",
  "release:character-icons",
  "release:character-skill-trees",
  # Enemies (icons deferred — dump has no icon data for enemies)
  "release:enemies",
  # Threats
  "release:threats",
  "release:threat-icons",
  # Collectables
  "release:collectables",
  "release:collectable-icons",
  # Rarities
  "release:rarities",
  "release:rarity-icons",
  # Crafting (singleton, no icon)
  "release:crafting",
  # Directives (mission modifiers)
  "release:directives",
  "release:directive-icons",
  # Missions
  "release:missions",
  "release:mission-icons",
  # Skins (per-cosmetic-upgrade pages + per-variant preview assets)
  "release:skins",
  "release:skin-previews",
  # Upgrade presets (Coppertone, Bloodmetal, etc.)
  "release:upgrade-presets"
]
run = '''
echo ""
echo "=== Generation complete ==="
echo "Output is in generated-wiki-source/ (gitignored — regeneratable)."
echo ""
echo "Then push to the wiki — run individually or all at once:"
echo ""
echo "  Per-entity (each has matching upload-<entity>-files for icons/patterns):"
echo "    mise run release:upload-wiki                 # upgrades"
echo "    mise run release:upload-gears                # gears"
echo "    mise run release:upload-status-effects       # status effects"
echo "    mise run release:upload-resources            # resources"
echo "    mise run release:upload-characters           # characters (host pages flagged)"
echo "    mise run release:upload-enemies              # enemies"
echo "    mise run release:upload-threats              # threats"
echo "    mise run release:upload-collectables         # collectables"
echo "    mise run release:upload-rarities             # rarities"
echo "    mise run release:upload-crafting             # crafting (singleton)"
echo "    mise run release:upload-directives           # directives (mission modifiers)"
echo ""
echo "  All at once:"
echo "    mise run release:upload"
'''

