[tools]
bun = "1.2.10"
python = "3.13.5"

# ──────────────────────────────────────────────────────────────────────
# Release pipeline — run when a new game version drops.
#
#   mise run release           # sync + generate everything (icons, patterns, wiki)
#   mise run release:upload    # push everything to the wiki (after review)
#
# Or run individual stages: release:sync, release:icons, release:patterns,
# release:source, release:gears, release:upload-files, release:upload-wiki.
#
# Prerequisite for icons: extract the new game's Unity assets to
# ~/MycopunkExtracted/<version>/ExportedProject/Assets/Texture2D using
# AssetStudio or UABEA. Version comes from data.json's gameVersion.Version.
# ──────────────────────────────────────────────────────────────────────

[tasks."release:sync"]
description = "Fetch latest game data dump from mycopunk-data"
run = "bun scripts/sync-data.ts"

[tasks."release:icons"]
description = "Extract upgrade icons from spritesheets (auto-resolves version from data.json)"
depends = ["release:sync"]
run = '''
VERSION=$(jq -r '.gameVersion.Version' static/data.json)
SPRITES="$HOME/MycopunkExtracted/$VERSION/ExportedProject/Assets/Texture2D"
if [ ! -d "$SPRITES" ]; then
  echo "✗ Spritesheets not found: $SPRITES"
  echo "  Extract with AssetStudio/UABEA from the game install for $VERSION,"
  echo "  then re-run: mise run release:icons"
  exit 1
fi
echo "→ Using spritesheets: $SPRITES"
bun scripts/generate-upgrade-icons.ts "$SPRITES"
'''

[tasks."release:patterns"]
description = "Generate upgrade hex-pattern SVGs"
depends = ["release:sync"]
run = "bun scripts/generate-upgrade-svgs.ts"

[tasks."release:source"]
description = "Generate upgrade /source + skeleton wiki pages"
depends = ["release:sync"]
run = "bun scripts/generate-upgrade-source.ts"

